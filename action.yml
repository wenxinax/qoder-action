name: 'Qoder Action'
description: 'Transparent launcher for qodercli in GitHub Actions'

branding:
  icon: 'code'
  color: 'green'

inputs:
  prompt:
    description: 'Instructions for qodercli (passed to -p flag)'
    required: true
    default: ''
  
  flags:
    description: |
      Additional CLI arguments to pass to qodercli.
      Multiple lines are supported.
      Each line should be a valid flag.
    required: false
    default: ''
  
  qoder_personal_access_token:
    description: 'Qoder personal access token for authentication'
    required: true
  
  enable_qoder_github_mcp:
    description: 'Enable qoder-github MCP Server for enhanced GitHub operations'
    required: false
    default: 'true'
  
  qodercli_version:
    description: 'Version of qodercli to install'
    required: false
    default: '0.1.10'

outputs:
  output_file:
    description: 'Path to file containing qodercli stdout output'
    value: ${{ steps.run_cli.outputs.output_file }}
  
  error:
    description: 'Error message from qodercli (if failed)'
    value: ${{ steps.run_cli.outputs.error }}

runs:
  using: 'composite'
  steps:
    - name: Install qodercli
      shell: bash
      env:
        QODERCLI_VERSION: ${{ inputs.qodercli_version }}
      run: |
        echo "Installing qodercli version ${QODERCLI_VERSION} via npm..."
        npm install -g @qoder-ai/qodercli@${QODERCLI_VERSION}
        echo "✓ qodercli installed successfully"
        qodercli --version

    - name: Configure Git Authentication
      id: auth
      shell: bash
      env:
        QODER_PERSONAL_ACCESS_TOKEN: ${{ inputs.qoder_personal_access_token }}
        ACTION_TOKEN: ${{ github.token }}
      run: |
        set -e

        echo "Requesting OIDC token..."
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
          echo "::error::OIDC token request failed. Please ensure your workflow has 'permissions: id-token: write'"
          exit 1
        fi
        
        RESPONSE=$(curl -sSf -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=qoder-action")
        OIDC_TOKEN=$(echo "${RESPONSE}" | jq -r '.value')
        
        if [ -z "${OIDC_TOKEN}" ] || [ "${OIDC_TOKEN}" = "null" ]; then
          echo "::error::Failed to extract OIDC token from response"
          exit 1
        fi
                
        EXCHANGE_URL="https://qoder.com/api/github/github-app-token-exchange"        
        HTTP_CODE=$(curl -X POST -w "%{http_code}" -s -o /tmp/token_response.json \
          -H "Authorization: Bearer ${OIDC_TOKEN}" \
          -H "X-Qoder-Personal-Access-Token: ${QODER_PERSONAL_ACCESS_TOKEN}" \
          "${EXCHANGE_URL}")
        
        TOKEN_RESPONSE=$(cat /tmp/token_response.json)
        
        if [ "${HTTP_CODE}" -ne 200 ]; then
          ERROR_MESSAGE=$(echo "${TOKEN_RESPONSE}" | jq -r '.errorMessage // "Unknown"')
          REQUEST_ID=$(echo "${TOKEN_RESPONSE}" | jq -r '.requestId // "N/A"')
          
          if echo "${ERROR_MESSAGE}" | grep -qi "invalid personal access token"; then
            echo "::error::Your Qoder Personal Access Token is invalid or expired. Please update the secret and try again."
          elif echo "${ERROR_MESSAGE}" | grep -qi "no authorized record\|GitHub App is not installed"; then
            echo "::error::The Qoder GitHub App is not configured correctly. Please run /setup-github locally to complete the configuration."
          elif echo "${ERROR_MESSAGE}" | grep -qi "invalid OIDC token"; then
            echo "::error::OIDC authentication failed. Please re-run the job."
          else
            echo "::error::Please contact Qoder support with the Request ID: ${REQUEST_ID}"
          fi
          
          exit 1
        fi
        
        INSTALLATION_TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.token // empty')
        
        echo "github_token=${INSTALLATION_TOKEN}" >> "$GITHUB_OUTPUT"
        
        BOT_LOGIN="qoderai[bot]"
        BOT_ID="215938697"
        
        SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed 's|https\?://||' | sed 's|/.*||')
        if [ "${SERVER_HOST}" = "github.com" ]; then
          NOREPLY_DOMAIN="users.noreply.github.com"
        else
          NOREPLY_DOMAIN="users.noreply.${SERVER_HOST}"
        fi
        
        git config user.name "${BOT_LOGIN}"
        git config user.email "${BOT_ID}+${BOT_LOGIN}@${NOREPLY_DOMAIN}"  
        git config --unset-all "http.${GITHUB_SERVER_URL}/.extraheader" 2>/dev/null || true
        
        REMOTE_URL="https://x-access-token:${INSTALLATION_TOKEN}@${SERVER_HOST}/${GITHUB_REPOSITORY}.git"
        git remote set-url origin "${REMOTE_URL}"

    - name: Setup qoder-github MCP Server
      if: inputs.enable_qoder_github_mcp == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
      run: |
        QODER_GITHUB_MCP_VERSION="dev"
        
        echo "Downloading qoder-github MCP server..."
        curl -fsSL "https://download.qoder.com/qodercli/mcp/qoder-github-mcp-server/releases/${QODER_GITHUB_MCP_VERSION}/qoder-github-mcp-server" -o /tmp/qoder-github-mcp-server
        chmod +x /tmp/qoder-github-mcp-server
        sudo mv /tmp/qoder-github-mcp-server /usr/local/bin/qoder-github-mcp-server
        echo "✓ qoder-github MCP server installed"
        
        echo "Creating MCP configuration..."
        cat > "$HOME/.qoder.json" <<EOF
        {
          "mcpServers": {
            "qoder_github": {
              "command": "/usr/local/bin/qoder-github-mcp-server",
              "args": ["stdio"],
              "env": {
                "GITHUB_TOKEN": "${GITHUB_TOKEN}",
                "GITHUB_REPOSITORY": "${GITHUB_REPOSITORY}",
                "GITHUB_RUN_ID": "${GITHUB_RUN_ID}",
                "GITHUB_SERVER_URL": "${GITHUB_SERVER_URL}"
              },
              "type": "stdio"
            }
          }
        }
        EOF
        echo "✓ MCP configuration created"

    - name: Setup qodercli environment
      shell: bash
      run: |
        set -e
        
        echo "Setting up qodercli environment..."

        # Create .qoder directory
        mkdir -p "$HOME/.qoder/commands" "$HOME/.qoder/subagents"
        
        # Copy built-in resources
        if [ -d "${GITHUB_ACTION_PATH}/.qoder" ]; then
          cp -R "${GITHUB_ACTION_PATH}/.qoder/"* "$HOME/.qoder/" 2>/dev/null && \
            echo "✓ Built-in resources installed" || \
            echo "::warning::Failed to copy built-in resources"
        fi
        
        echo "✓ Environment setup completed"

    - name: Run qodercli
      id: run_cli
      shell: bash
      env:
        QODER_PERSONAL_ACCESS_TOKEN: ${{ inputs.qoder_personal_access_token }}
        GITHUB_TOKEN: ${{ steps.auth.outputs.github_token }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_FLAGS: ${{ inputs.flags }}
      run: |
        set +e 
        
        # Prepare output files
        OUTPUT_FILE="/tmp/qoder-output-$(date +%s).log"
        ERROR_FILE="/tmp/qoder-error-$(date +%s).log"
        
        # Build command arguments
        ARGS=("-w" "$GITHUB_WORKSPACE")
        
        # Add prompt
        [ -n "${INPUT_PROMPT}" ] && ARGS+=("-p" "${INPUT_PROMPT}")
        
        # Add default output format if not specified by user
        if ! echo "${INPUT_FLAGS}" | grep -qE '(^|\s)(-f|--output-format)(\s|$)'; then
          ARGS+=("-f" "stream-json")
        fi
        
        # Parse and add user flags
        if [ -n "${INPUT_FLAGS}" ]; then
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -n "$line" ] && ARGS+=("$line")
          done <<< "$INPUT_FLAGS"
        fi
        
        echo "Executing qodercli with arguments:"
        printf '  %s\n' "${ARGS[@]}"
        echo ""
        
        # Execute qodercli and capture stdout/stderr separately
        qodercli "${ARGS[@]}" > >(tee "$OUTPUT_FILE") 2> >(tee "$ERROR_FILE" >&2)
        EXIT_CODE=$?
        wait
        
        # Set outputs
        echo "output_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
        if [ -f "${ERROR_FILE}" ] && [ -s "${ERROR_FILE}" ]; then
          {
            echo "error<<QODER_ERROR_EOF"
            cat "$ERROR_FILE"
            echo "QODER_ERROR_EOF"
          } >> "$GITHUB_OUTPUT"
        else
          echo "error=" >> "$GITHUB_OUTPUT"
        fi
        
        # Handle execution result
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✓ qodercli executed successfully"
        else
          echo "::error::qodercli failed with exit code ${EXIT_CODE}"
          
          # Output error details to annotations
          if [ -f "${ERROR_FILE}" ] && [ -s "${ERROR_FILE}" ]; then
            cat "$ERROR_FILE" | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
          
          exit $EXIT_CODE
        fi

    - name: Revoke GitHub App Token
      if: always() && steps.auth.outputs.github_token != ''
      shell: bash
      env:
        APP_TOKEN: ${{ steps.auth.outputs.github_token }}
      run: |
        set +e
        
        echo "Revoking GitHub App installation token..."
        
        # Revoke the token using GitHub API
        REVOKE_RESPONSE=$(curl -sSf -X DELETE \
          -H "Authorization: Bearer ${APP_TOKEN}" \
          "https://api.github.com/installation/token" 2>&1)
        
        if [ $? -eq 0 ]; then
          echo "✓ GitHub App token revoked successfully"
        else
          echo "::warning::Failed to revoke GitHub App token: ${REVOKE_RESPONSE}"
          echo "::warning::The token will expire automatically, but manual cleanup is recommended"
        fi
