name: 'Qoder Action'
description: 'Transparent launcher for qodercli in GitHub Actions'

branding:
  icon: 'code'
  color: 'green'

inputs:
  prompt:
    description: 'Instructions for qodercli (passed to -p flag)'
    required: true
    default: ''
  
  flags:
    description: |
      Additional CLI arguments to pass to qodercli.
      Each line should be a valid flag (e.g., --max-turns 10).
      Multiple lines are supported.
    required: false
    default: ''
  
  qoder_personal_access_token:
    description: 'Qoder personal access token for authentication'
    required: true

outputs:
  output_file:
    description: 'Path to file containing qodercli stdout output'
    value: ${{ steps.run_cli.outputs.output_file }}
  
  error:
    description: 'Error message from qodercli (if failed)'
    value: ${{ steps.run_cli.outputs.error }}

runs:
  using: 'composite'
  steps:
    - name: Install qodercli
      shell: bash
      run: |
        echo "Downloading qodercli binary..."
        curl -fsSL https://qcli-aone.oss-cn-hangzhou.aliyuncs.com/github/qodercli -o /tmp/qodercli
        chmod +x /tmp/qodercli
        sudo mv /tmp/qodercli /usr/local/bin/qodercli
        echo "✓ qodercli installed successfully"
        qodercli --version || echo "Version check not available"

    - name: Configure Git Authentication
      id: auth
      shell: bash
      env:
        QODER_PERSONAL_ACCESS_TOKEN: ${{ inputs.qoder_personal_access_token }}
      run: |
        set -e
        
        QODER_API_BASE_URL="http://dev.lingma-agents-api.aliyuncs.com"
        
        echo "Requesting OIDC token..."
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
          echo "::error::OIDC token request failed. Ensure workflow has 'permissions: id-token: write'"
          exit 1
        fi
        
        RESPONSE=$(curl -sSf -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=qoder-action")
        OIDC_TOKEN=$(echo "${RESPONSE}" | jq -r '.value')
        
        if [ -z "${OIDC_TOKEN}" ] || [ "${OIDC_TOKEN}" = "null" ]; then
          echo "::error::Failed to extract OIDC token from response"
          exit 1
        fi
        
        echo "=== OIDC Token Debug (Base64 encoded) ==="
        echo "$(echo -n "${OIDC_TOKEN}" | base64)"
        echo "=========================================="
        echo "✓ OIDC token retrieved (length: ${#OIDC_TOKEN})"
        echo ""
        
        # Exchange OIDC token for GitHub App installation token
        EXCHANGE_URL="${QODER_API_BASE_URL}/v1/github/oidc/token"
        echo "Exchanging OIDC token at: ${EXCHANGE_URL}"
        
        TOKEN_RESPONSE=$(curl -sSf -X POST "${EXCHANGE_URL}" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -H "X-Qoder-Personal-Access-Token: ${QODER_PERSONAL_ACCESS_TOKEN}" \
          -d "oidc_token=$(printf '%s' "${OIDC_TOKEN}" | jq -sRr '@uri')" 2>&1)
        
        if [ $? -ne 0 ]; then
          echo "::warning::Failed to exchange token: ${TOKEN_RESPONSE}"
          echo "::warning::Will continue without GitHub App token."
          echo "app_token=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        INSTALLATION_TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.installation_token // empty')
        
        if [ -z "${INSTALLATION_TOKEN}" ] || [ "${INSTALLATION_TOKEN}" = "null" ]; then
          echo "::warning::installation_token not found in response"
          echo "::warning::Will continue without GitHub App token."
          echo "app_token=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        echo "app_token=${INSTALLATION_TOKEN}" >> "$GITHUB_OUTPUT"
        echo "✓ Successfully exchanged OIDC token for installation_token"
        
        echo "=== GitHub App Token Debug (Base64 encoded) ==="
        echo "$(echo -n "${INSTALLATION_TOKEN}" | base64)"
        echo "==============================================="
        echo ""
        
        # Configure Git authentication
        echo "Configuring Git authentication..."
        
        BOT_LOGIN="qoderai[bot]"
        BOT_ID="215938697"
        
        SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed 's|https\?://||' | sed 's|/.*||')
        if [ "${SERVER_HOST}" = "github.com" ]; then
          NOREPLY_DOMAIN="users.noreply.github.com"
        else
          NOREPLY_DOMAIN="users.noreply.${SERVER_HOST}"
        fi
        
        git config user.name "${BOT_LOGIN}"
        git config user.email "${BOT_ID}+${BOT_LOGIN}@${NOREPLY_DOMAIN}"
        echo "✓ Git user: ${BOT_LOGIN} <${BOT_ID}+${BOT_LOGIN}@${NOREPLY_DOMAIN}>"
        
        git config --unset-all "http.${GITHUB_SERVER_URL}/.extraheader" 2>/dev/null || true
        
        REMOTE_URL="https://x-access-token:${INSTALLATION_TOKEN}@${SERVER_HOST}/${GITHUB_REPOSITORY}.git"
        git remote set-url origin "${REMOTE_URL}"
        echo "✓ Git authentication configured successfully"

    - name: Setup qoder-github MCP Server
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.app_token }}
        GITHUB_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO: ${{ github.event.repository.name }}
      run: |
        echo "Downloading qoder-github MCP server..."
        curl -fsSL https://download.qoder.com/qodercli/mcp/qoder-github-mcp-server -o /tmp/qoder-github-mcp-server
        chmod +x /tmp/qoder-github-mcp-server
        sudo mv /tmp/qoder-github-mcp-server /usr/local/bin/qoder-github-mcp-server
        echo "✓ qoder-github MCP server installed"
        
        echo "Creating MCP configuration..."
        cat > "$HOME/.qoder.json" <<EOF
        {
          "mcpServers": {
            "qoder_github": {
              "command": "/usr/local/bin/qoder-github-mcp-server",
              "args": ["stdio"],
              "env": {
                "GITHUB_TOKEN": "${GITHUB_TOKEN}",
                "GITHUB_OWNER": "${GITHUB_OWNER}",
                "GITHUB_REPO": "${GITHUB_REPO}"
              },
              "type": "stdio"
            }
          }
        }
        EOF
        echo "✓ MCP configuration created"

    - name: Setup qodercli environment
      shell: bash
      env:
        QODER_PERSONAL_ACCESS_TOKEN: ${{ inputs.qoder_personal_access_token }}
        GITHUB_TOKEN: ${{ steps.auth.outputs.app_token }}
      run: |
        set -e
        
        echo "Setting up qodercli environment..."
        
        # Debug: Print current user and home directory
        echo "=== Environment Debug Info ==="
        echo "Current user: $(whoami)"
        echo "HOME: ${HOME}"
        echo "PWD: $(pwd)"
        echo "GITHUB_ACTION_PATH: ${GITHUB_ACTION_PATH}"
        echo "=============================="
        echo ""
        
        # Create .qoder directory in home
        mkdir -p "$HOME/.qoder/commands" "$HOME/.qoder/subagents"
        
        # Copy built-in resources if they exist
        if [ -d "${GITHUB_ACTION_PATH}/.qoder" ]; then
          echo "Installing built-in commands and subagents..."
          echo "Source: ${GITHUB_ACTION_PATH}/.qoder"
          echo ""
          
          # Show source structure
          echo "=== Source .qoder structure ==="
          ls -laR "${GITHUB_ACTION_PATH}/.qoder" || echo "Failed to list source"
          echo "=============================="
          echo ""
          
          cp -R "${GITHUB_ACTION_PATH}/.qoder/"* "$HOME/.qoder/" 2>/dev/null || true
          
          # Show destination structure
          echo "=== Destination $HOME/.qoder structure ==="
          ls -laR "$HOME/.qoder" || echo "Failed to list destination"
          echo "=============================="
          echo ""
        else
          echo "::warning::No built-in resources found at ${GITHUB_ACTION_PATH}/.qoder"
          echo "Checking if .qoder exists in action path:"
          ls -la "${GITHUB_ACTION_PATH}" || true
        fi
        
        # Inject environment variables for qodercli
        echo "QODER_PERSONAL_ACCESS_TOKEN=${QODER_PERSONAL_ACCESS_TOKEN}" >> "$GITHUB_ENV"
        
        # Configure gh CLI with App token for GitHub operations
        if [ -n "${GITHUB_TOKEN}" ]; then
          echo "Configuring gh CLI with GitHub App token..."
          echo "${GITHUB_TOKEN}" | gh auth login --with-token 2>/dev/null || true
          echo "✓ gh CLI configured"
        fi
        
        # Verify MCP configuration
        echo ""
        echo "=== Verifying MCP Configuration ==="
        if [ -f "$HOME/.qoder.json" ]; then
          echo "✓ .qoder.json exists"
          echo "Content:"
          cat "$HOME/.qoder.json"
          echo ""
          
          echo "Listing configured MCP servers..."
          qodercli mcp list || echo "::warning::Failed to list MCP servers"
          echo ""
          
          echo "Getting qoder_github MCP server details..."
          qodercli mcp get qoder_github || echo "::warning::Failed to get qoder_github MCP server config"
        else
          echo "::warning::.qoder.json not found at $HOME/.qoder.json"
        fi
        echo "=============================="
        echo ""
        
        echo "✓ Environment setup completed"

    - name: Run qodercli
      id: run_cli
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_FLAGS: ${{ inputs.flags }}
      run: |
        set +e  # Don't exit on error, we need to capture it
        
        # Debug: Print environment info
        echo "=== Runtime Environment Debug Info ==="
        echo "Current user: $(whoami)"
        echo "HOME: ${HOME}"
        echo "PWD: $(pwd)"
        echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
        echo ""
        echo "=== $HOME/.qoder structure ==="
        if [ -d "$HOME/.qoder" ]; then
          ls -laR "$HOME/.qoder" || echo "Failed to list .qoder"
        else
          echo "::warning::$HOME/.qoder does not exist!"
        fi
        echo "=============================="
        echo ""
        
        # Prepare output files
        OUTPUT_FILE="/tmp/qoder-output-$(date +%s).log"
        ERROR_FILE="/tmp/qoder-error-$(date +%s).log"
        
        # Build command arguments array
        ARGS=()
        ARGS+=("-w" "$GITHUB_WORKSPACE")
        ARGS+=("--dangerously-skip-permissions")
        
        # Add prompt if provided (use array to handle multi-line)
        if [ -n "${INPUT_PROMPT}" ]; then
          ARGS+=("-p" "${INPUT_PROMPT}")
        fi
        
        # Check if user specified output format in flags
        USER_SPECIFIED_FORMAT=false
        if [ -n "${INPUT_FLAGS}" ]; then
          if echo "${INPUT_FLAGS}" | grep -qE '(^|\s)(-f|--output-format)(\s|$)'; then
            USER_SPECIFIED_FORMAT=true
          fi
        fi
        
        # Add default output format if user didn't specify
        if [ "${USER_SPECIFIED_FORMAT}" = false ]; then
          ARGS+=("-f" "stream-json")
        fi
        
        # Parse and add user flags
        if [ -n "${INPUT_FLAGS}" ]; then
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            if [ -n "$line" ]; then
              ARGS+=("$line")
            fi
          done <<< "$INPUT_FLAGS"
        fi
        
        echo "Executing qodercli with arguments:"
        printf '  %s\n' "${ARGS[@]}"
        echo ""
        
        # Execute qodercli and capture stdout and stderr separately
        qodercli "${ARGS[@]}" > >(tee "$OUTPUT_FILE") 2> >(tee "$ERROR_FILE" >&2)
        EXIT_CODE=$?
        
        # Wait for background processes to finish
        wait
        
        echo ""
        echo "Output file: ${OUTPUT_FILE}"
        echo "Error file: ${ERROR_FILE}"
        
        # Set outputs
        echo "output_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
        
        # Always set error output (may contain content even if exit code is 0)
        if [ -f "${ERROR_FILE}" ]; then
          ERROR_CONTENT=$(cat "$ERROR_FILE")
          echo "error<<EOF" >> "$GITHUB_OUTPUT"
          echo "${ERROR_CONTENT}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        else
          echo "error=" >> "$GITHUB_OUTPUT"
        fi
        
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✓ qodercli executed successfully (exit code: 0)"
        else
          echo "::error::qodercli failed with exit code ${EXIT_CODE}"
          exit $EXIT_CODE
        fi

    - name: Revoke GitHub App Token
      if: always() && steps.auth.outputs.app_token != ''
      shell: bash
      env:
        APP_TOKEN: ${{ steps.auth.outputs.app_token }}
      run: |
        set +e  # Don't fail the workflow if revoke fails
        
        echo "Revoking GitHub App installation token..."
        
        # Revoke the token using GitHub API
        REVOKE_RESPONSE=$(curl -sSf -X DELETE \
          -H "Authorization: Bearer ${APP_TOKEN}" \
          "https://api.github.com/installation/token" 2>&1)
        
        if [ $? -eq 0 ]; then
          echo "✓ GitHub App token revoked successfully"
        else
          echo "::warning::Failed to revoke GitHub App token: ${REVOKE_RESPONSE}"
          echo "::warning::The token will expire automatically, but manual cleanup is recommended"
        fi
